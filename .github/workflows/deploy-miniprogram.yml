name: 部署微信小程序

on:
  push:
    branches:
      - main
    paths:
      - "face-score-miniprogram/**" # 只有修改小程序目录才触发
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置Node.js环境
      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # 3. 安装miniprogram-ci
      - name: 安装微信小程序CI工具
        run: npm install -g miniprogram-ci

      # 4. 进入小程序目录
      - name: 进入小程序目录
        working-directory: ./face-score-miniprogram
        run: pwd

      # 5. 配置私钥
      - name: 配置私钥
        working-directory: ./face-score-miniprogram
        run: |
          echo "${{ secrets.WECHAT_PRIVATE_KEY }}" | base64 -d > private.key
          ls -la private.key

      # 6. 配置环境变量
      - name: 配置环境变量
        working-directory: ./face-score-miniprogram
        run: |
          cd config
          echo "module.exports = {" > config.local.js
          echo "  apiUrl: '${{ secrets.API_BASE_URL }}'," >> config.local.js
          echo "  appid: '${{ secrets.WECHAT_APPID }}'," >> config.local.js
          echo "  debug: false" >> config.local.js
          echo "};" >> config.local.js
          cat config.local.js

      # 7. 上传小程序代码
      - name: 上传小程序代码
        working-directory: ./face-score-miniprogram
        run: |
          # 使用GitHub Actions运行次数作为版本号，格式：1.0.${run_number}
          VERSION="1.0.${{ github.run_number }}"
          echo "使用版本号: $VERSION"

          # 按照官方文档使用正确的命令行参数
          miniprogram-ci upload \
            --appid ${{ secrets.WECHAT_APPID }} \
            --pkp ./private.key \
            --pp . \
            --uv "$VERSION" \
            --ud "自动部署 - ${{ github.event.head_commit.message }}" \
            --robot 1 \
            --enable-es6 true \
            --enable-minify true \
            --verbose

      # 8. 清理临时文件
      - name: 清理私钥
        if: always()
        working-directory: ./face-score-miniprogram
        run: rm -f private.key

      # 9. 输出部署结果
      - name: 部署完成
        run: echo "小程序部署成功！"
