name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Pages (with Functions)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 🐾
        uses: actions/checkout@v4

      - name: Install Wrangler 📦
        run: npm install -g wrangler

      - name: Deploy Pages 🚀
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.ACCOUNT_ID }}
          command: |
            pages deploy public --project-name=face-score-pages --var WECHAT_APPID="${{ secrets.WECHAT_APPID }}" --var WECHAT_PRIVATE_KEY="${{ secrets.WECHAT_PRIVATE_KEY }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}