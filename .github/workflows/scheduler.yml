name: Scheduled Tasks
on:
  schedule:
    # 每天下午18点运行
    - cron: "0 18 * * *"
  workflow_dispatch: # 允许手动触发

jobs:
  run-scheduled-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Run Cleanup Task
        run: |
          curl -X GET ${{ secrets.API_BASE_URL }}/api/cleanup

      - name: Run Verify Task
        run: |
          curl -X GET ${{ secrets.API_BASE_URL }}/api/verify?action=retention
