<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png">
  <title>萌牛测颜 - 科学打分 & 气质分析</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>
</head>

<body>
  <div class="container">
    <header class="home-header">
      <div class="home-logo">
        <img src="/logo.png" alt="Logo">
      </div>
      <h1 class="home-title">萌牛测颜</h1>
      <p class="home-subtitle">上传一张照片，获取您的颜值分数与气质分析报告</p>
    </header>

    <div class="mode-selector">
      <div class="mode-item active" onclick="switchMode('score')" id="mode-score">
        <span class="mode-icon">💖</span>
        <span>颜值评分</span>
      </div>
      <div class="mode-item" onclick="switchMode('fortune')" id="mode-fortune">
        <span class="mode-icon">✨</span>
        <span>气质解读</span>
      </div>
      <div class="mode-item" onclick="switchMode('couple')" id="mode-couple">
        <span class="mode-icon">💕</span>
        <span>CP契合度</span>
      </div>
    </div>

    <div class="file-upload-wrapper" id="uploadWrapper">
      <input type="file" id="fileInput" accept="image/*" />
      <label for="fileInput" class="file-upload-label" id="uploadLabel">
        <div class="upload-placeholder">
          <svg class="file-upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
            </path>
          </svg>
          <span class="file-upload-text" id="uploadText">点击选择照片</span>
        </div>
        <img id="preview" class="upload-preview" alt="Preview" />
      </label>
    </div>

    <div class="file-upload-wrapper couple-upload" id="uploadWrapperB" style="display: none;">
      <input type="file" id="fileInputB" accept="image/*" />
      <label for="fileInputB" class="file-upload-label" id="uploadLabelB">
        <div class="upload-placeholder">
          <svg class="file-upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
            </path>
          </svg>
          <span class="file-upload-text" id="uploadTextB">点击选择第二张照片</span>
        </div>
        <img id="previewB" class="upload-preview" alt="Preview B" />
      </label>
    </div>

    <div class="turnstile-container">
      <div id="turnstile-widget" data-theme="light"></div>
    </div>

    <button id="submitBtn" class="btn-primary">生成分析报告</button>

    <div id="result"></div>

    <button id="imagesBtn" class="secondary-btn" style="display: none;">浏览所有颜值照片</button>
    <button id="logoutBtn" class="secondary-btn" onclick="handleLogout()" style="display: none;">退出登录</button>
  </div>

  <script>
    document.getElementById("fileInput").onchange = function () {
      const fileInput = this;
      const previewImg = document.getElementById("preview");
      const uploadLabel = document.getElementById("uploadLabel");

      if (!fileInput.files.length) {
        previewImg.classList.remove("show");
        uploadLabel.classList.remove("has-image");
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function () {
        previewImg.src = reader.result;
        previewImg.classList.add("show");
        uploadLabel.classList.add("has-image");
      };
      reader.readAsDataURL(file);
    };

    document.getElementById("fileInputB").onchange = function () {
      const fileInput = this;
      const previewImg = document.getElementById("previewB");
      const uploadLabel = document.getElementById("uploadLabelB");

      if (!fileInput.files.length) {
        previewImg.classList.remove("show");
        uploadLabel.classList.remove("has-image");
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function () {
        previewImg.src = reader.result;
        previewImg.classList.add("show");
        uploadLabel.classList.add("has-image");
      };
      reader.readAsDataURL(file);
    };

    let currentMode = 'score';
    let imageBase64A = '';
    let imageBase64B = '';

    function switchMode(mode) {
      if (currentMode === mode) return;
      currentMode = mode;

      document.querySelectorAll('.mode-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`mode-${mode}`).classList.add('active');

      const btn = document.getElementById('submitBtn');
      const uploadText = document.getElementById('uploadText');
      const uploadWrapperB = document.getElementById('uploadWrapperB');

      if (mode === 'score') {
        btn.innerText = '开始颜值评分';
        uploadText.innerText = '点击选择照片';
        uploadWrapperB.style.display = 'none';
      } else if (mode === 'fortune') {
        btn.innerText = '生成气质分析';
        uploadText.innerText = '上传照片，测测你的气质';
        uploadWrapperB.style.display = 'none';
      } else {
        btn.innerText = '开始CP契合度测试';
        uploadText.innerText = '点击选择第一张照片';
        uploadWrapperB.style.display = 'block';
      }

      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'none';
      resultDiv.innerHTML = '';
    }

    let turnstileEnabled = false;

    async function initTurnstile() {
      const widgetContainer = document.querySelector('.turnstile-container');
      try {
        const res = await fetch('/api/turnstile');
        const data = await res.json();

        if (data.site_key && typeof data.site_key === 'string' && data.site_key.trim()) {
          turnstileEnabled = true;
          turnstile.render('#turnstile-widget', {
            sitekey: data.site_key,
            theme: 'light'
          });
        } else {
          turnstileEnabled = false;
          console.warn('Turnstile site key not configured, skip captcha');
          if (widgetContainer) widgetContainer.style.display = 'none';
        }
      } catch (error) {
        turnstileEnabled = false;
        console.error('Failed to initialize Turnstile, skip captcha:', error);
        if (widgetContainer) widgetContainer.style.display = 'none';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initTurnstile();

      const imagesBtn = document.getElementById('imagesBtn');
      if (imagesBtn) {
        imagesBtn.addEventListener('click', () => {
          window.location.href = '/images';
        });
      }

      async function checkLoginStatus() {
        try {
          const response = await fetch('/api/auth', { credentials: 'include' });
          const data = await response.json();

          const logoutBtn = document.getElementById('logoutBtn');
          const imagesBtn = document.getElementById('imagesBtn');

          if (data.success) {
            logoutBtn.style.display = 'block';
            imagesBtn.style.display = 'block';
          } else {
            logoutBtn.style.display = 'none';
            imagesBtn.style.display = 'none';
          }
        } catch (error) {
          console.error('检查登录状态失败:', error);
          document.getElementById('logoutBtn').style.display = 'none';
          document.getElementById('imagesBtn').style.display = 'none';
        }
      }

      checkLoginStatus();
    });

    async function handleLogout() {
      try {
        await fetch('/api/auth', {
          method: 'DELETE',
          credentials: 'include'
        });
        window.location.reload();
      } catch (error) {
        console.error('登出失败:', error);
        alert('登出失败，请稍后重试');
      }
    }

    let clickCount = 0;
    const titleElement = document.querySelector('.home-title');

    if (titleElement) {
      titleElement.addEventListener('click', async () => {
        clickCount++;

        if (clickCount === 5) {
          try {
            const response = await fetch('/api/auth', { credentials: 'include' });
            const data = await response.json();

            if (data.success) {
              window.location.href = '/images';
            } else {
              window.location.href = '/api/auth/github';
            }
          } catch (error) {
            console.error('检查登录状态失败:', error);
            window.location.href = '/api/auth/github';
          }

          clickCount = 0;
        }
      });
    }

    document.getElementById("submitBtn").onclick = async function () {
      const fileInput = document.getElementById("fileInput");
      const fileInputB = document.getElementById("fileInputB");
      const resultDiv = document.getElementById("result");

      if (currentMode === 'couple') {
        if (!fileInput.files.length || !fileInputB.files.length) {
          alert("喵～请选择两张照片才能测试CP契合度哦！");
          return;
        }

        resultDiv.innerHTML = '<div class="loading-spinner"></div><div class="loading-text">正在分析两人的契合度...</div>';
        resultDiv.style.display = 'block';

        try {
          const readerA = new FileReader();
          const readerB = new FileReader();

          const base64A = await new Promise((resolve) => {
            readerA.onload = () => resolve(readerA.result.split(",")[1]);
            readerA.readAsDataURL(fileInput.files[0]);
          });

          const base64B = await new Promise((resolve) => {
            readerB.onload = () => resolve(readerB.result.split(",")[1]);
            readerB.readAsDataURL(fileInputB.files[0]);
          });

          let token = null;
          if (turnstileEnabled && typeof turnstile !== 'undefined' && typeof turnstile.getResponse === 'function') {
            token = turnstile.getResponse();
            if (!token) {
              resultDiv.innerHTML = '<div style="text-align: center; padding: 20px;">验证失败，请完成验证码喵～</div>';
              return;
            }
          }

          const res = await fetch("/api/couple", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              imageA: base64A,
              imageB: base64B,
              ...(token ? { turnstile_response: token } : {})
            }),
          });
          if (!res.ok) throw new Error("接口请求失败");
          const data = await res.json();

          if (data.score !== undefined && data.score !== null) {
            const score = Number(data.score.toFixed(1));
            let msg = `💕 CP契合度：${score} / 100\n\n`;
            msg += `等级：${data.grade || '待评估'}\n\n`;
            if (data.highlights) msg += `匹配亮点：${data.highlights}\n\n`;
            if (data.notes) msg += `需要注意：${data.notes}\n\n`;
            if (data.tags) msg += `标签：${data.tags}`;
            resultDiv.innerText = msg;
          } else {
            resultDiv.innerText = "分析失败，请重试。";
          }
        } catch (e) {
          resultDiv.innerText = "网络信号溜去捉迷藏啦，请检查网络后再试一次喵～";
        } finally {
          if (turnstileEnabled && typeof turnstile !== 'undefined' && typeof turnstile.reset === 'function') {
            turnstile.reset('#turnstile-widget');
          }
        }
        return;
      }

      if (!fileInput.files.length) {
        alert("喵～先选张照片才能评分哦！");
        return;
      }
      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = async function () {
        const base64 = reader.result.split(",")[1];
        resultDiv.innerHTML = '<div class="loading-spinner"></div><div class="loading-text">' + 
          (currentMode === 'score' ? '正在分析五官特征...' : '美学分析师正在解读气质...') + '</div>';
        resultDiv.style.display = 'block';

        try {
          let token = null;
          if (turnstileEnabled && typeof turnstile !== 'undefined' && typeof turnstile.getResponse === 'function') {
            token = turnstile.getResponse();
            if (!token) {
              resultDiv.innerHTML = '<div style="text-align: center; padding: 20px;">验证失败，请完成验证码喵～</div>';
              return;
            }
          }

          const apiEndpoint = currentMode === 'score' ? "/api/score" : "/api/fortune";

          const res = await fetch(apiEndpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              image: base64,
              ...(token ? { turnstile_response: token } : {})
            }),
          });
          if (!res.ok) throw new Error("接口请求失败");
          const data = await res.json();


          if ((data.score !== undefined && data.score !== null) || data.type === 'fortune') {

            if (currentMode === 'score') {
              if (data.score !== undefined) {
                const score = Number(data.score.toFixed(1));
                let msg = `颜值分数：${score} / 100 🐾\n\n`;

                if (data.comment) {
                  msg += `分析点评：${data.comment}\n\n`;
                } else {
                  if (score < 40) msg += "🐱 喵呜，内在美才是最最重要的！抱抱～";
                  else if (score < 50) msg += "💫 你有那种治愈系的可爱气质，慢慢展现更迷人喵～";
                  else if (score < 60) msg += "✨ 中等颜值，但有特别的小闪光点，越看越舒服～";
                  else if (score < 70) msg += "😻 哇，已经很有吸引力啦，有点明星气场呢！";
                  else if (score < 80) msg += "🌟 超棒！你走在街上绝对是回头率超高的小猫猫！";
                  else msg += "🔥 绝绝子！你的颜值突破天际，令人惊艳！";
                }
                resultDiv.innerText = msg;
              } else {
                resultDiv.innerText = "评分数据缺失，请重试。";
              }

            } else {
              if (data.title && data.comment) {
                resultDiv.innerHTML = `<strong>${data.title}</strong>\n\n${data.comment}`;
              } else if (data.comment) {
                resultDiv.innerText = data.comment;
              } else {
                resultDiv.innerText = "分析完成，但未生成解读内容。";
              }
            }
          } else {
            resultDiv.innerText = "检测失败，喵呜～换张更清晰的照片试试吧？";
          }
        } catch (e) {
          resultDiv.innerText = "网络信号溜去捉迷藏啦，请检查网络后再试一次喵～";
          console.error("评分请求错误:", e);
        } finally {
          if (turnstileEnabled && typeof turnstile !== 'undefined' && typeof turnstile.reset === 'function') {
            turnstile.reset('#turnstile-widget');
          }
        }
      };
      reader.readAsDataURL(file);
    };
  </script>
</body>

</html>
