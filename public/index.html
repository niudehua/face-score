<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png">
  <title>颜究所 - 科学打分 & 气质分析</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">
        <img src="/logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
      </div>
      <h1>颜究所</h1>
      <p>上传一张照片，获取您的颜值分数与气质分析报告</p>
    </header>

    <div class="mode-selector">
      <div class="mode-item active" onclick="switchMode('score')" id="mode-score">颜值评分</div>
      <div class="mode-item" onclick="switchMode('fortune')" id="mode-fortune">气质解读</div>
    </div>

    <div class="file-upload-wrapper">
      <input type="file" id="fileInput" accept="image/*" />
      <label for="fileInput" class="file-upload-label" id="uploadLabel">
        <div class="upload-placeholder">
          <svg class="file-upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
            </path>
          </svg>
          <span class="file-upload-text" id="uploadText">点击选择照片</span>
        </div>
        <img id="preview" class="upload-preview" alt="Preview" />
      </label>
    </div>

    <div class="turnstile-container">
      <div id="turnstile-widget" data-theme="light"></div>
    </div>

    <button id="submitBtn">生成分析报告</button>

    <div id="result"></div>

    <button id="imagesBtn" class="secondary-btn" style="display: none;">浏览所有颜值照片</button>
    <button id="logoutBtn" class="secondary-btn" onclick="handleLogout()" style="display: none;">退出登录</button>
  </div>

  <script>
    // 文件选择后立即预览
    document.getElementById("fileInput").onchange = function () {
      const fileInput = this;
      const previewImg = document.getElementById("preview");
      const uploadLabel = document.getElementById("uploadLabel");

      if (!fileInput.files.length) {
        previewImg.classList.remove("show");
        uploadLabel.classList.remove("has-image");
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function () {
        previewImg.src = reader.result;
        previewImg.classList.add("show");
        uploadLabel.classList.add("has-image");
      };
      reader.readAsDataURL(file);
    };

    // 模式切换逻辑
    let currentMode = 'score'; // 'score' | 'fortune'

    function switchMode(mode) {
      if (currentMode === mode) return;
      currentMode = mode;

      // 更新 Tab 样式
      document.querySelectorAll('.mode-item').forEach(el => el.classList.remove('active'));
      document.getElementById(`mode-${mode}`).classList.add('active');

      // 更新按钮文字
      const btn = document.getElementById('submitBtn');
      btn.innerText = mode === 'score' ? '开始颜值评分' : '生成气质分析';

      // 更新上传提示语
      const uploadText = document.getElementById('uploadText');
      uploadText.innerText = mode === 'score' ? '点击选择照片' : '上传照片，测测你的气质';

      // 隐藏结果区域
      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'none';
      resultDiv.innerText = '';
    }

    // Turnstile 状态标记（未配置则跳过）
    let turnstileEnabled = false;

    // 动态初始化 Turnstile 组件，若未配置则隐藏控件
    async function initTurnstile() {
      const widgetContainer = document.querySelector('.turnstile-container');
      try {
        const res = await fetch('/api/turnstile');
        const data = await res.json();

        if (data.site_key && typeof data.site_key === 'string' && data.site_key.trim()) {
          turnstileEnabled = true;
          // 使用获取到的站点密钥初始化 Turnstile 组件
          turnstile.render('#turnstile-widget', {
            sitekey: data.site_key,
            theme: 'light'
          });
        } else {
          turnstileEnabled = false;
          console.warn('Turnstile site key not configured, skip captcha');
          if (widgetContainer) widgetContainer.style.display = 'none';
        }
      } catch (error) {
        turnstileEnabled = false;
        console.error('Failed to initialize Turnstile, skip captcha:', error);
        if (widgetContainer) widgetContainer.style.display = 'none';
      }
    }

    // 页面加载完成后初始化事件监听
    document.addEventListener('DOMContentLoaded', () => {
      // 初始化 Turnstile 组件
      initTurnstile();

      // 添加查看所有图片按钮的点击事件
      const imagesBtn = document.getElementById('imagesBtn');
      if (imagesBtn) {
        imagesBtn.addEventListener('click', () => {
          window.location.href = '/images';
        });
      }

      // 检查登录状态并显示相应按钮
      async function checkLoginStatus() {
        try {
          const response = await fetch('/api/auth', { credentials: 'include' });
          const data = await response.json();

          const logoutBtn = document.getElementById('logoutBtn');
          const imagesBtn = document.getElementById('imagesBtn');

          if (data.success) {
            // 已登录，显示登出和图片按钮，隐藏登录按钮
            logoutBtn.style.display = 'block';
            imagesBtn.style.display = 'block';
          } else {
            // 未登录，隐藏管理入口按钮，仅保留后门触发
            logoutBtn.style.display = 'none';
            imagesBtn.style.display = 'none';
          }
        } catch (error) {
          console.error('检查登录状态失败:', error);
          // 出错时隐藏所有按钮
          document.getElementById('logoutBtn').style.display = 'none';
          document.getElementById('imagesBtn').style.display = 'none';
        }
      }

      // 页面加载时检查登录状态
      checkLoginStatus();
    });

    // 登出函数
    async function handleLogout() {
      try {
        await fetch('/api/auth', {
          method: 'DELETE',
          credentials: 'include'
        });
        // 登出成功，刷新页面
        window.location.reload();
      } catch (error) {
        console.error('登出失败:', error);
        alert('登出失败，请稍后重试');
      }
    }

    // 标题点击计数器
    let clickCount = 0;
    const titleElement = document.querySelector('h1');

    // 点击事件处理
    if (titleElement) {
      titleElement.addEventListener('click', async () => {
        clickCount++;

        // 点击5次触发后门
        if (clickCount === 5) {
          try {
            const response = await fetch('/api/auth', { credentials: 'include' });
            const data = await response.json();

            if (data.success) {
              // 已登录或后门开启，直接进入图片列表
              window.location.href = '/images';
            } else {
              // 未登录，跳转到GitHub登录
              window.location.href = '/api/auth/github';
            }
          } catch (error) {
            console.error('检查登录状态失败:', error);
            // 出错时直接跳转到登录
            window.location.href = '/api/auth/github';
          }

          // 重置计数器
          clickCount = 0;
        }
      });
    }

    document.getElementById("submitBtn").onclick = async function () {
      const fileInput = document.getElementById("fileInput");
      if (!fileInput.files.length) {
        alert("喵～先选张照片才能评分哦！");
        return;
      }
      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = async function () {
        const base64 = reader.result.split(",")[1];
        const resultDiv = document.getElementById("result");
        resultDiv.innerText = currentMode === 'score' ? "正在分析五官特征..." : "美学分析师正在解读气质...";
        resultDiv.style.display = 'block';

        try {
          // 获取 Turnstile 响应令牌（仅当启用且组件可用）
          let token = null;
          if (turnstileEnabled && typeof turnstile !== 'undefined' && typeof turnstile.getResponse === 'function') {
            token = turnstile.getResponse();
            if (!token) {
              resultDiv.innerText = "验证失败，请完成验证码喵～";
              return;
            }
          }

          const apiEndpoint = currentMode === 'score' ? "/api/score" : "/api/fortune";

          const res = await fetch(apiEndpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              image: base64,
              // 仅在启用时携带 Turnstile token
              ...(token ? { turnstile_response: token } : {})
            }),
          });
          if (!res.ok) throw new Error("接口请求失败");
          const data = await res.json();


          // 这里的逻辑需要同时兼容 score 模式 (有 score 字段) 和 fortune 模式 (有 type='fortune' 字段)
          if ((data.score !== undefined && data.score !== null) || data.type === 'fortune') {

            if (currentMode === 'score') {
              // 颜值评分模式结果
              if (data.score !== undefined) {
                const score = Number(data.score.toFixed(1));
                let msg = `颜值分数：${score} / 100 🐾\n\n`;

                if (data.comment) {
                  msg += `分析点评：${data.comment}\n\n`;
                } else {
                  if (score < 40) msg += "🐱 喵呜，内在美才是最最重要的！抱抱～";
                  else if (score < 50) msg += "💫 你有那种治愈系的可爱气质，慢慢展现更迷人喵～";
                  else if (score < 60) msg += "✨ 中等颜值，但有特别的小闪光点，越看越舒服～";
                  else if (score < 70) msg += "😻 哇，已经很有吸引力啦，有点明星气场呢！";
                  else if (score < 80) msg += "🌟 超棒！你走在街上绝对是回头率超高的小猫猫！";
                  else msg += "🔥 绝绝子！你的颜值突破天际，令人惊艳！";
                }
                resultDiv.innerText = msg;
              } else {
                resultDiv.innerText = "评分数据缺失，请重试。";
              }

            } else {
              // 气质解读模式结果
              if (data.title && data.comment) {
                resultDiv.innerHTML = `<strong>${data.title}</strong>\n\n${data.comment}`;
              } else if (data.comment) {
                resultDiv.innerText = data.comment;
              } else {
                resultDiv.innerText = "分析完成，但未生成解读内容。";
              }
            }
          } else {
            resultDiv.innerText = "检测失败，喵呜～换张更清晰的照片试试吧？";
          }
        } catch (e) {
          resultDiv.innerText = "网络信号溜去捉迷藏啦，请检查网络后再试一次喵～";
          console.error("评分请求错误:", e);
        } finally {
          // 重置 Turnstile 验证码，防止 token 重用导致 invalid (Error 600010)
          if (turnstileEnabled && typeof turnstile !== 'undefined' && typeof turnstile.reset === 'function') {
            turnstile.reset('#turnstile-widget');
          }
        }
      };
      reader.readAsDataURL(file);
    };
  </script>
</body>

</html>
