<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png">
  <title>萌牛测颜 - 科学打分 & 气质分析</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="/style.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js"></script>
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="logo-area">
        <img src="/logo.png" alt="萌牛测颜" class="logo" />
      </div>
      <h1 class="title">萌牛测颜</h1>
      <p class="subtitle">上传照片，发现你的独特魅力</p>
    </header>

    <main class="main">
      <div class="tabs">
        <button class="tab active" data-mode="score" id="mode-score">
          <span class="tab-emoji">💖</span>
          <span class="tab-text">颜值评分</span>
        </button>
        <button class="tab" data-mode="fortune" id="mode-fortune">
          <span class="tab-emoji">✨</span>
          <span class="tab-text">气质解读</span>
        </button>
        <button class="tab" data-mode="couple" id="mode-couple">
          <span class="tab-emoji">💕</span>
          <span class="tab-text">CP匹配度</span>
        </button>
      </div>

      <div class="upload-section">
        <label class="upload-box" for="fileInput" id="uploadBox">
          <input type="file" id="fileInput" accept="image/*" class="upload-input" />
          <div class="upload-content">
            <div class="upload-icon">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ff6ec7" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
              </svg>
            </div>
            <div class="upload-text" id="uploadText">点击上传照片</div>
            <div class="upload-hint">支持 JPG、PNG 格式</div>
          </div>
          <img id="preview" class="upload-preview" alt="预览" style="display: none;" />
          <button class="upload-clear" id="previewClear" style="display: none;" onclick="event.preventDefault(); event.stopPropagation(); clearSinglePreview();">×</button>
        </label>

        <div class="couple-section" id="coupleSection" style="display: none;">
          <div class="couple-container">
            <label class="couple-box" for="fileInputA" id="coupleBoxA">
              <input type="file" id="fileInputA" accept="image/*" class="couple-input" />
              <div class="couple-content">
                <div class="couple-icon">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ff6ec7" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                  </svg>
                </div>
                <div class="couple-label">我的照片</div>
              </div>
              <img id="previewA" class="couple-preview" alt="我的照片" style="display: none;" />
              <button class="couple-clear-btn" id="clearA" style="display: none;" onclick="event.preventDefault(); event.stopPropagation(); clearCouplePreview('A');">×</button>
            </label>

            <div class="couple-connector">💕</div>

            <label class="couple-box" for="fileInputB" id="coupleBoxB">
              <input type="file" id="fileInputB" accept="image/*" class="couple-input" />
              <div class="couple-content">
                <div class="couple-icon">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#666666" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                  </svg>
                </div>
                <div class="couple-label">TA的照片</div>
              </div>
              <img id="previewB" class="couple-preview" alt="TA的照片" style="display: none;" />
              <button class="couple-clear-btn" id="clearB" style="display: none;" onclick="event.preventDefault(); event.stopPropagation(); clearCouplePreview('B');">×</button>
            </label>
          </div>
        </div>
      </div>

      <div class="captcha" id="captchaSection">
        <div id="turnstile-widget"></div>
      </div>

      <button id="submitBtn" class="btn">
        <span class="btn-text">开始颜值评分</span>
        <span class="btn-arrow">→</span>
      </button>

      <div id="resultCard" class="result"></div>

      <div class="account" id="accountSection">
        <button id="imagesBtn" class="account-btn" style="display: none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          <span>浏览颜值照片</span>
        </button>
        <button id="logoutBtn" class="account-btn" onclick="handleLogout()" style="display: none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          <span>退出登录</span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>萌牛测颜 · 仅供娱乐</p>
    </footer>

    <canvas id="shareCanvas" style="display: none;"></canvas>
  </div>

  <script>
    let currentMode = 'score';
    let turnstileEnabled = false;

    document.addEventListener('DOMContentLoaded', () => {
      initTurnstile();
      initEventListeners();
      checkLoginStatus();
    });

    function initEventListeners() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => switchMode(tab.dataset.mode));
      });

      document.getElementById('fileInput').addEventListener('change', handleSingleFileSelect);
      document.getElementById('fileInputA').addEventListener('change', (e) => handleCoupleFileSelect(e, 'A'));
      document.getElementById('fileInputB').addEventListener('change', (e) => handleCoupleFileSelect(e, 'B'));

      document.getElementById('previewClear').addEventListener('click', clearSinglePreview);
      document.getElementById('clearA').addEventListener('click', (e) => {
        e.stopPropagation();
        clearCouplePreview('A');
      });
      document.getElementById('clearB').addEventListener('click', (e) => {
        e.stopPropagation();
        clearCouplePreview('B');
      });

      document.getElementById('submitBtn').addEventListener('click', handleSubmit);
    }

    function handleSingleFileSelect() {
      const fileInput = document.getElementById('fileInput');
      const previewImg = document.getElementById('preview');
      const uploadContent = document.querySelector('#uploadBox .upload-content');
      const clearBtn = document.getElementById('previewClear');

      if (!fileInput.files.length) {
        previewImg.style.display = 'none';
        uploadContent.style.display = 'flex';
        clearBtn.style.display = 'none';
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function () {
        previewImg.src = reader.result;
        previewImg.style.display = 'block';
        uploadContent.style.display = 'none';
        clearBtn.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function handleCoupleFileSelect(e, side) {
      const fileInput = document.getElementById(`fileInput${side}`);
      const previewImg = document.getElementById(`preview${side}`);
      const coupleContent = document.querySelector(`#coupleBox${side} .couple-content`);
      const clearBtn = document.getElementById(`clear${side}`);

      if (!fileInput.files.length) {
        previewImg.style.display = 'none';
        coupleContent.style.display = 'flex';
        clearBtn.style.display = 'none';
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function () {
        previewImg.src = reader.result;
        previewImg.style.display = 'block';
        coupleContent.style.display = 'none';
        clearBtn.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function clearSinglePreview() {
      const fileInput = document.getElementById('fileInput');
      const previewImg = document.getElementById('preview');
      const uploadContent = document.querySelector('#uploadBox .upload-content');
      const clearBtn = document.getElementById('previewClear');

      fileInput.value = '';
      previewImg.style.display = 'none';
      uploadContent.style.display = 'flex';
      clearBtn.style.display = 'none';
    }

    function clearCouplePreview(side) {
      const fileInput = document.getElementById(`fileInput${side}`);
      const previewImg = document.getElementById(`preview${side}`);
      const coupleContent = document.querySelector(`#coupleBox${side} .couple-content`);
      const clearBtn = document.getElementById(`clear${side}`);

      fileInput.value = '';
      previewImg.style.display = 'none';
      coupleContent.style.display = 'flex';
      clearBtn.style.display = 'none';
    }

    function switchMode(mode) {
      if (currentMode === mode) return;
      currentMode = mode;

      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById(`mode-${mode}`).classList.add('active');

      const btn = document.getElementById('submitBtn');
      const btnText = btn.querySelector('.btn-text');
      const uploadBox = document.getElementById('uploadBox');
      const coupleSection = document.getElementById('coupleSection');
      const uploadText = document.getElementById('uploadText');

      if (mode === 'score') {
        btnText.innerText = '开始颜值评分';
        uploadBox.style.display = 'block';
        coupleSection.style.display = 'none';
        uploadText.innerText = '点击上传照片';
      } else if (mode === 'fortune') {
        btnText.innerText = '生成气质分析';
        uploadBox.style.display = 'block';
        coupleSection.style.display = 'none';
        uploadText.innerText = '上传照片，测测气质';
      } else {
        btnText.innerText = '开始CP匹配度测试';
        uploadBox.style.display = 'none';
        coupleSection.style.display = 'block';
      }

      const resultCard = document.getElementById('resultCard');
      resultCard.style.display = 'none';
      resultCard.innerHTML = '';
    }

    async function initTurnstile() {
      const container = document.getElementById('captchaSection');
      try {
        const res = await fetch('/api/turnstile');
        const data = await res.json();

        if (data.site_key && typeof data.site_key === 'string' && data.site_key.trim()) {
          turnstileEnabled = true;
          turnstile.render('#turnstile-widget', {
            sitekey: data.site_key,
            theme: 'light'
          });
        } else {
          turnstileEnabled = false;
          if (container) container.style.display = 'none';
        }
      } catch (error) {
        turnstileEnabled = false;
        if (container) container.style.display = 'none';
      }
    }

    async function checkLoginStatus() {
      try {
        const response = await fetch('/api/auth', { credentials: 'include' });
        const data = await response.json();

        const logoutBtn = document.getElementById('logoutBtn');
        const imagesBtn = document.getElementById('imagesBtn');

        if (data.success) {
          logoutBtn.style.display = 'flex';
          imagesBtn.style.display = 'flex';
        } else {
          logoutBtn.style.display = 'none';
          imagesBtn.style.display = 'none';
        }
      } catch (error) {
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('imagesBtn').style.display = 'none';
      }
    }

    async function handleLogout() {
      try {
        await fetch('/api/auth', {
          method: 'DELETE',
          credentials: 'include'
        });
        window.location.reload();
      } catch (error) {
        alert('登出失败，请稍后重试');
      }
    }

    let clickCount = 0;
    const titleElement = document.querySelector('.title');
    if (titleElement) {
      titleElement.addEventListener('click', async () => {
        clickCount++;
        if (clickCount === 5) {
          try {
            const response = await fetch('/api/auth', { credentials: 'include' });
            const data = await response.json();
            if (data.success) {
              window.location.href = '/images';
            } else {
              window.location.href = '/api/auth/github';
            }
          } catch (error) {
            window.location.href = '/api/auth/github';
          }
          clickCount = 0;
        }
      });
    }

    async function handleSubmit() {
      const fileInput = document.getElementById('fileInput');
      const fileInputA = document.getElementById('fileInputA');
      const fileInputB = document.getElementById('fileInputB');
      const resultCard = document.getElementById('resultCard');

      if (currentMode === 'couple') {
        if (!fileInputA.files.length || !fileInputB.files.length) {
          alert("喵～请选择两张照片才能测试CP匹配度哦！");
          return;
        }

        resultCard.innerHTML = '<div class="loading"><div class="loader"></div><div class="loading-text">正在计算缘分指数...</div></div>';
        resultCard.style.display = 'block';

        try {
          const readerA = new FileReader();
          const readerB = new FileReader();

          const base64A = await new Promise((resolve) => {
            readerA.onload = () => resolve(readerA.result.split(",")[1]);
            readerA.readAsDataURL(fileInputA.files[0]);
          });

          const base64B = await new Promise((resolve) => {
            readerB.onload = () => resolve(readerB.result.split(",")[1]);
            readerB.readAsDataURL(fileInputB.files[0]);
          });

          let token = null;
          if (turnstileEnabled && typeof turnstile !== 'undefined' && typeof turnstile.getResponse === 'function') {
            token = turnstile.getResponse();
            if (!token) {
              resultCard.innerHTML = '<div class="error">验证失败，请完成验证码喵～</div>';
              return;
            }
          }

          const res = await fetch("/api/couple", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              imageA: base64A,
              imageB: base64B,
              ...(token ? { turnstile_response: token } : {})
            }),
          });
          if (!res.ok) throw new Error("接口请求失败");
          const data = await res.json();

          if (data.score !== undefined && data.score !== null) {
            const score = Number(data.score.toFixed(1));
            let msg = `💕 CP匹配度：${score} / 100\n\n`;
            msg += `等级：${data.grade || '待评估'}\n\n`;
            if (data.highlights) msg += `匹配亮点：${data.highlights}\n\n`;
            if (data.notes) msg += `需要注意：${data.notes}\n\n`;
            if (data.tags) msg += `标签：${data.tags}`;
            resultCard.innerText = msg;
          } else {
            resultCard.innerText = "分析失败，请重试。";
          }
        } catch (e) {
          resultCard.innerText = "网络信号溜去捉迷藏啦，请检查网络后再试一次喵～";
        } finally {
          if (turnstileEnabled && typeof turnstile !== 'undefined' && typeof turnstile.reset === 'function') {
            turnstile.reset('#turnstile-widget');
          }
        }
        return;
      }

      if (!fileInput.files.length) {
        alert("喵～先选张照片才能评分哦！");
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = async function () {
        const base64 = reader.result.split(",")[1];
        resultCard.innerHTML = '<div class="loading"><div class="loader"></div><div class="loading-text">' +
          (currentMode === 'score' ? '正在分析五官特征...' : '美学分析师正在解读气质...') + '</div></div>';
        resultCard.style.display = 'block';

        try {
          let token = null;
          if (turnstileEnabled && typeof turnstile !== 'undefined' && typeof turnstile.getResponse === 'function') {
            token = turnstile.getResponse();
            if (!token) {
              resultCard.innerHTML = '<div class="error">验证失败，请完成验证码喵～</div>';
              return;
            }
          }

          const apiEndpoint = currentMode === 'score' ? "/api/score" : "/api/fortune";

          const res = await fetch(apiEndpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              image: base64,
              ...(token ? { turnstile_response: token } : {})
            }),
          });
          if (!res.ok) throw new Error("接口请求失败");
          const data = await res.json();

          if ((data.score !== undefined && data.score !== null) || data.type === 'fortune') {
            if (currentMode === 'score') {
              if (data.score !== undefined) {
                const score = Number(data.score.toFixed(1));
                let msg = `颜值分数：${score} / 100 🐾\n\n`;

                if (data.comment) {
                  msg += `分析点评：${data.comment}\n\n`;
                } else {
                  if (score < 40) msg += "🐱 喵呜，内在美才是最最重要的！抱抱～";
                  else if (score < 50) msg += "💫 你有那种治愈系的可爱气质，慢慢展现更迷人喵～";
                  else if (score < 60) msg += "✨ 中等颜值，但有特别的小闪光点，越看越舒服～";
                  else if (score < 70) msg += "😻 哇，已经很有吸引力啦，有点明星气场呢！";
                  else if (score < 80) msg += "🌟 超棒！你走在街上绝对是回头率超高的小猫猫！";
                  else msg += "🔥 绝绝子！你的颜值突破天际，令人惊艳！";
                }
                resultCard.innerText = msg;
              } else {
                resultCard.innerText = "评分数据缺失，请重试。";
              }
            } else {
              if (data.title && data.comment) {
                resultCard.innerHTML = `<strong>${data.title}</strong>\n\n${data.comment}`;
              } else if (data.comment) {
                resultCard.innerText = data.comment;
              } else {
                resultCard.innerText = "分析完成，但未生成解读内容。";
              }
            }
          } else {
            resultCard.innerText = "检测失败，喵呜～换张更清晰的照片试试吧？";
          }
        } catch (e) {
          resultCard.innerText = "网络信号溜去捉迷藏啦，请检查网络后再试一次喵～";
        } finally {
          if (turnstileEnabled && typeof turnstile !== 'undefined' && typeof turnstile.reset === 'function') {
            turnstile.reset('#turnstile-widget');
          }
        }
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>

</html>
