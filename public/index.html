<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png">
  <title>萌牛测颜 - 科学打分 & 气质分析</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="page">
    <header class="header">
      <div class="logo-area">
        <img src="/logo.png" alt="萌牛测颜" class="logo" />
      </div>
      <h1 class="title">萌牛测颜</h1>
      <p class="subtitle">上传照片，发现你的独特魅力</p>
    </header>

    <main class="main">
      <div class="tabs">
        <button class="tab active" data-mode="score" id="mode-score">
          <span class="tab-emoji">💖</span>
          <span class="tab-text">颜值评分</span>
        </button>
        <button class="tab" data-mode="fortune" id="mode-fortune">
          <span class="tab-emoji">✨</span>
          <span class="tab-text">气质解读</span>
        </button>
        <button class="tab" data-mode="couple" id="mode-couple">
          <span class="tab-emoji">💕</span>
          <span class="tab-text">CP匹配度</span>
        </button>
      </div>

      <div class="preview-area">
        <div class="single-preview" id="singlePreview">
          <label class="preview-box" for="fileInput">
            <input type="file" id="fileInput" accept="image/*" />
            <div class="preview-inner">
              <div class="preview-placeholder">
                <span class="placeholder-emoji">💖</span>
                <span class="placeholder-text" id="placeholderText">点击上传照片</span>
              </div>
              <img id="preview" class="preview-img" alt="预览" />
              <button class="preview-clear" id="previewClear" style="display: none;">×</button>
            </div>
          </label>
        </div>

        <div class="couple-preview" id="couplePreview" style="display: none;">
          <div class="couple-row">
            <label class="couple-card" for="fileInputA">
              <input type="file" id="fileInputA" accept="image/*" />
              <div class="couple-inner">
                <div class="couple-placeholder" id="placeholderA">
                  <span class="placeholder-emoji">👧</span>
                  <span class="placeholder-text">我的照片</span>
                </div>
                <img id="previewA" class="couple-img" alt="我的照片" />
                <button class="couple-clear" id="clearA" style="display: none;">×</button>
              </div>
              <span class="couple-name">我</span>
            </label>

            <div class="couple-heart">💕</div>

            <label class="couple-card" for="fileInputB">
              <input type="file" id="fileInputB" accept="image/*" />
              <div class="couple-inner">
                <div class="couple-placeholder" id="placeholderB">
                  <span class="placeholder-emoji">👦</span>
                  <span class="placeholder-text">TA的照片</span>
                </div>
                <img id="previewB" class="couple-img" alt="TA的照片" />
                <button class="couple-clear" id="clearB" style="display: none;">×</button>
              </div>
              <span class="couple-name">TA</span>
            </label>
          </div>
        </div>
      </div>

      <div class="verify-section" id="verifySection">
        <div class="verify-box" id="verifyBox">
          <span class="verify-icon">👀</span>
          <span class="verify-text">我不是机器人</span>
        </div>
        <div class="verify-success" id="verifySuccess" style="display: none;">
          <span class="verify-icon">✅</span>
          <span class="verify-text">验证通过</span>
        </div>
      </div>

      <button id="submitBtn" class="btn">
        <span class="btn-text">开始颜值评分</span>
        <span class="btn-arrow">→</span>
      </button>

      <div id="resultCard" class="result"></div>

      <div class="account" id="accountSection">
        <button id="imagesBtn" class="account-btn" style="display: none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          <span>浏览颜值照片</span>
        </button>
        <button id="logoutBtn" class="account-btn" onclick="handleLogout()" style="display: none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          <span>退出登录</span>
        </button>
      </div>
    </main>

    <footer class="footer">
      <p>萌牛测颜 · 仅供娱乐</p>
    </footer>

    <canvas id="shareCanvas" style="display: none;"></canvas>
  </div>

  <script>
    let currentMode = 'score';
    let isVerified = false;

    document.addEventListener('DOMContentLoaded', () => {
      initEventListeners();
      checkLoginStatus();
    });

    function initEventListeners() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => switchMode(tab.dataset.mode));
      });

      document.getElementById('fileInput').addEventListener('change', handleSingleFileSelect);
      document.getElementById('fileInputA').addEventListener('change', (e) => handleCoupleFileSelect(e, 'A'));
      document.getElementById('fileInputB').addEventListener('change', (e) => handleCoupleFileSelect(e, 'B'));

      document.getElementById('previewClear').addEventListener('click', clearSinglePreview);
      document.getElementById('clearA').addEventListener('click', (e) => {
        e.stopPropagation();
        clearCouplePreview('A');
      });
      document.getElementById('clearB').addEventListener('click', (e) => {
        e.stopPropagation();
        clearCouplePreview('B');
      });

      document.getElementById('verifyBox').addEventListener('click', handleVerify);
      document.getElementById('submitBtn').addEventListener('click', handleSubmit);
    }

    function handleSingleFileSelect() {
      const fileInput = document.getElementById('fileInput');
      const previewImg = document.getElementById('preview');
      const placeholder = document.querySelector('#singlePreview .preview-placeholder');
      const clearBtn = document.getElementById('previewClear');

      if (!fileInput.files.length) {
        previewImg.classList.remove('show');
        placeholder.style.display = 'flex';
        clearBtn.style.display = 'none';
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function () {
        previewImg.src = reader.result;
        previewImg.classList.add('show');
        placeholder.style.display = 'none';
        clearBtn.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function handleCoupleFileSelect(e, side) {
      const fileInput = document.getElementById(`fileInput${side}`);
      const previewImg = document.getElementById(`preview${side}`);
      const placeholder = document.getElementById(`placeholder${side}`);
      const clearBtn = document.getElementById(`clear${side}`);

      if (!fileInput.files.length) {
        previewImg.classList.remove('show');
        placeholder.style.display = 'flex';
        clearBtn.style.display = 'none';
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = function () {
        previewImg.src = reader.result;
        previewImg.classList.add('show');
        placeholder.style.display = 'none';
        clearBtn.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function clearSinglePreview() {
      const fileInput = document.getElementById('fileInput');
      const previewImg = document.getElementById('preview');
      const placeholder = document.querySelector('#singlePreview .preview-placeholder');
      const clearBtn = document.getElementById('previewClear');

      fileInput.value = '';
      previewImg.classList.remove('show');
      placeholder.style.display = 'flex';
      clearBtn.style.display = 'none';
    }

    function clearCouplePreview(side) {
      const fileInput = document.getElementById(`fileInput${side}`);
      const previewImg = document.getElementById(`preview${side}`);
      const placeholder = document.getElementById(`placeholder${side}`);
      const clearBtn = document.getElementById(`clear${side}`);

      fileInput.value = '';
      previewImg.classList.remove('show');
      placeholder.style.display = 'flex';
      clearBtn.style.display = 'none';
    }

    function switchMode(mode) {
      if (currentMode === mode) return;
      currentMode = mode;

      document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
      document.getElementById(`mode-${mode}`).classList.add('active');

      const btn = document.getElementById('submitBtn');
      const btnText = btn.querySelector('.btn-text');
      const singlePreview = document.getElementById('singlePreview');
      const couplePreview = document.getElementById('couplePreview');
      const placeholderText = document.getElementById('placeholderText');
      const placeholderEmoji = document.querySelector('#singlePreview .placeholder-emoji');

      if (mode === 'score') {
        btnText.innerText = '开始颜值评分';
        singlePreview.style.display = 'block';
        couplePreview.style.display = 'none';
        placeholderText.innerText = '点击上传照片';
        placeholderEmoji.innerText = '💖';
      } else if (mode === 'fortune') {
        btnText.innerText = '生成气质分析';
        singlePreview.style.display = 'block';
        couplePreview.style.display = 'none';
        placeholderText.innerText = '上传照片，测测气质';
        placeholderEmoji.innerText = '✨';
      } else {
        btnText.innerText = '开始CP匹配度测试';
        singlePreview.style.display = 'none';
        couplePreview.style.display = 'block';
      }

      const resultCard = document.getElementById('resultCard');
      resultCard.style.display = 'none';
      resultCard.innerHTML = '';
      resetVerify();
    }

    function handleVerify() {
      isVerified = true;
      document.getElementById('verifyBox').style.display = 'none';
      document.getElementById('verifySuccess').style.display = 'flex';
    }

    function resetVerify() {
      isVerified = false;
      document.getElementById('verifyBox').style.display = 'flex';
      document.getElementById('verifySuccess').style.display = 'none';
    }

    async function checkLoginStatus() {
      try {
        const response = await fetch('/api/auth', { credentials: 'include' });
        const data = await response.json();

        const logoutBtn = document.getElementById('logoutBtn');
        const imagesBtn = document.getElementById('imagesBtn');

        if (data.success) {
          logoutBtn.style.display = 'flex';
          imagesBtn.style.display = 'flex';
        } else {
          logoutBtn.style.display = 'none';
          imagesBtn.style.display = 'none';
        }
      } catch (error) {
        document.getElementById('logoutBtn').style.display = 'none';
        document.getElementById('imagesBtn').style.display = 'none';
      }
    }

    async function handleLogout() {
      try {
        await fetch('/api/auth', {
          method: 'DELETE',
          credentials: 'include'
        });
        window.location.reload();
      } catch (error) {
        alert('登出失败，请稍后重试');
      }
    }

    let clickCount = 0;
    const titleElement = document.querySelector('.title');
    if (titleElement) {
      titleElement.addEventListener('click', async () => {
        clickCount++;
        if (clickCount === 5) {
          try {
            const response = await fetch('/api/auth', { credentials: 'include' });
            const data = await response.json();
            if (data.success) {
              window.location.href = '/images';
            } else {
              window.location.href = '/api/auth/github';
            }
          } catch (error) {
            window.location.href = '/api/auth/github';
          }
          clickCount = 0;
        }
      });
    }

    async function handleSubmit() {
      if (!isVerified) {
        alert("喵～请先点击验证按钮证明你不是机器人哦！");
        return;
      }

      const fileInput = document.getElementById('fileInput');
      const fileInputA = document.getElementById('fileInputA');
      const fileInputB = document.getElementById('fileInputB');
      const resultCard = document.getElementById('resultCard');

      if (currentMode === 'couple') {
        if (!fileInputA.files.length || !fileInputB.files.length) {
          alert("喵～请选择两张照片才能测试CP匹配度哦！");
          return;
        }

        resultCard.innerHTML = '<div class="loading"><div class="loader"></div><div class="loading-text">正在计算缘分指数...</div></div>';
        resultCard.style.display = 'block';

        try {
          const readerA = new FileReader();
          const readerB = new FileReader();

          const base64A = await new Promise((resolve) => {
            readerA.onload = () => resolve(readerA.result.split(",")[1]);
            readerA.readAsDataURL(fileInputA.files[0]);
          });

          const base64B = await new Promise((resolve) => {
            readerB.onload = () => resolve(readerB.result.split(",")[1]);
            readerB.readAsDataURL(fileInputB.files[0]);
          });

          const res = await fetch("/api/couple", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              imageA: base64A,
              imageB: base64B,
              frontend_verified: true
            }),
          });
          if (!res.ok) throw new Error("接口请求失败");
          const data = await res.json();

          if (data.score !== undefined && data.score !== null) {
            const score = Number(data.score.toFixed(1));
            let msg = `💕 CP匹配度：${score} / 100\n\n`;
            msg += `等级：${data.grade || '待评估'}\n\n`;
            if (data.highlights) msg += `匹配亮点：${data.highlights}\n\n`;
            if (data.notes) msg += `需要注意：${data.notes}\n\n`;
            if (data.tags) msg += `标签：${data.tags}`;
            resultCard.innerText = msg;
          } else {
            resultCard.innerText = "分析失败，请重试。";
          }
        } catch (e) {
          resultCard.innerText = "网络信号溜去捉迷藏啦，请检查网络后再试一次喵～";
        } finally {
          resetVerify();
        }
        return;
      }

      if (!fileInput.files.length) {
        alert("喵～先选张照片才能评分哦！");
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = async function () {
        const base64 = reader.result.split(",")[1];
        resultCard.innerHTML = '<div class="loading"><div class="loader"></div><div class="loading-text">' +
          (currentMode === 'score' ? '正在分析五官特征...' : '美学分析师正在解读气质...') + '</div></div>';
        resultCard.style.display = 'block';

        try {
          const apiEndpoint = currentMode === 'score' ? "/api/score" : "/api/fortune";

          const res = await fetch(apiEndpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              image: base64,
              frontend_verified: true
            }),
          });
          if (!res.ok) throw new Error("接口请求失败");
          const data = await res.json();

          if ((data.score !== undefined && data.score !== null) || data.type === 'fortune') {
            if (currentMode === 'score') {
              if (data.score !== undefined) {
                const score = Number(data.score.toFixed(1));
                let msg = `颜值分数：${score} / 100 🐾\n\n`;

                if (data.comment) {
                  msg += `分析点评：${data.comment}\n\n`;
                } else {
                  if (score < 40) msg += "🐱 喵呜，内在美才是最最重要的！抱抱～";
                  else if (score < 50) msg += "💫 你有那种治愈系的可爱气质，慢慢展现更迷人喵～";
                  else if (score < 60) msg += "✨ 中等颜值，但有特别的小闪光点，越看越舒服～";
                  else if (score < 70) msg += "😻 哇，已经很有吸引力啦，有点明星气场呢！";
                  else if (score < 80) msg += "🌟 超棒！你走在街上绝对是回头率超高的小猫猫！";
                  else msg += "🔥 绝绝子！你的颜值突破天际，令人惊艳！";
                }
                resultCard.innerText = msg;
              } else {
                resultCard.innerText = "评分数据缺失，请重试。";
              }
            } else {
              if (data.title && data.comment) {
                resultCard.innerHTML = `<strong>${data.title}</strong>\n\n${data.comment}`;
              } else if (data.comment) {
                resultCard.innerText = data.comment;
              } else {
                resultCard.innerText = "分析完成，但未生成解读内容。";
              }
            }
          } else {
            resultCard.innerText = "检测失败，喵呜～换张更清晰的照片试试吧？";
          }
        } catch (e) {
          resultCard.innerText = "网络信号溜去捉迷藏啦，请检查网络后再试一次喵～";
        } finally {
          resetVerify();
        }
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>

</html>
